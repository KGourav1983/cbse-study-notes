<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — CBSE Prep</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/icons/favicon-32.png" sizes="32x32" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root { --ink-navy:#1b2a4a; --paper:#f6f5f0; --paper-raised:#ffffff; --marigold:#e8a33d; --slate:#5b6478; --line:#e1ddd2; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: "Inter", -apple-system, sans-serif; background: var(--paper); color: var(--ink-navy);
    text-align: center; padding: 24px;
  }
  .card { max-width: 440px; }
  h1 { font-family: "Newsreader", serif; font-size: 1.9rem; margin: 0 0 12px; }
  p { color: var(--slate); line-height: 1.6; margin: 0 0 26px; }
  a { display: inline-flex; padding: 12px 22px; border-radius: 10px; background: var(--ink-navy); color: var(--paper); text-decoration: none; font-weight: 600; }
  a:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div class="card">
    <h1>That page doesn't exist</h1>
    <p>
      The page or file you were looking for isn't here. If you followed a link
      from within CBSE Prep, it may point to content that hasn't been added yet.
    </p>
    <a href="/">Go to homepage</a>
  </div>
</body>
</html>
